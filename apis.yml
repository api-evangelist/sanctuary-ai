x-research-notes: >-
  As of 2026-05, sanctuary.ai's homepage, technology, about, news, blog, and
  careers pages contain no developer portal, no public API documentation,
  no SDKs, no CLI, no webhooks, no public OpenAPI/AsyncAPI specifications,
  no status page, no changelog, and no published pricing. The Sanctuary-AI
  GitHub organization (github.com/Sanctuary-AI, created 2023-02-04) exists
  but has 0 public repositories, 0 followers, and 0 public gists. Sanctuary
  AI is vertically integrated and treats its Carbon AI control system and
  Phoenix robot software stack as proprietary on-board systems. The
  commercial model is hardware sales and enterprise deployment partnerships
  rather than a developer/API surface. No artifacts (openapi/, asyncapi/,
  json-schema/, json-structure/, json-ld/, examples/, rules/, capabilities/,
  vocabulary/, plans/, rate-limits/, finops/, crd/) were generated for this
  repository because there is no underlying public API surface to back them.
