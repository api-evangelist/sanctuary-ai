aid: sanctuary-ai
name: Sanctuary AI
description: >-
  Sanctuary AI is a Vancouver, British Columbia humanoid robotics company
  on a mission to create and deploy industrial-grade general-purpose humanoid
  robots to help address growing labor challenges. Its flagship product is
  Phoenix, a bipedal humanoid robot designed for dull, dirty, and dangerous
  work in automotive, manufacturing, and logistics environments. Phoenix is
  driven by Carbon, Sanctuary AI's proprietary AI control system that mimics
  human cognitive subsystems — memory, sight, sound, and touch — to translate
  natural-language tasks into dexterous physical actions. The company is
  vertically integrated, designing everything from motors and actuators
  through to generative AI algorithms in-house. Co-founded by James Wells
  (CEO) and Olivia Norton (CTO/CPO), Sanctuary AI has a private GitHub
  organization with no public repositories, no developer portal, no public
  API, no SDK, and no published OpenAPI/AsyncAPI specifications. The
  commercial model is hardware sales and enterprise deployments; Carbon is
  a proprietary on-board system and there is no public developer surface.
